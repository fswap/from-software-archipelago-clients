name: Release

on:
  push:
    tags: ['ds3-v*.*.*']

env:
  # The prefix for tags that belong to the current stable release of the DS3
  # mod.
  STABLE_TAG_PREFIX_PREFIX: 'refs/tags/ds3-v4.0.'

jobs:
  version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.prerelease.outputs.prerelease }}
    steps:
    - id: version
      run: |
        ver="${{ github.ref_name }}"
        if [[ "$ver" == ds3-v* ]]; then
          ver="${ver:5}"
        fi
        echo "version=$ver" >> "$GITHUB_OUTPUT"
    - id: prerelease
      run: |
        if [[ "${{ github.ref_name }}" == ds3-*-* ]]; then
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi

  build-mod:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    - uses: Swatinem/rust-cache@v2

    - run: cargo build --release

    - uses: actions/upload-artifact@v4
      with:
        name: ds3_archipelago.dll
        path: target/release/ds3_archipelago.dll
        if-no-files-found: error

  build-static:
    runs-on: windows-latest
    needs: [version]

    steps:
    - uses: actions/checkout@v4
      with:
        repository: fswap/SoulsRandomizers
        ref: ${{ startsWith(github.ref, env.STABLE_TAG_PREFIX) && 'archipelago' || 'archipelago-next' }}
        token: ${{ secrets.GH_TOKEN }}
        path: SoulsRandomizers
    - uses: actions/checkout@v4
      with:
        repository: fswap/SoulsIds
        ref: event-id
        path: SoulsIds
    # Used by SoulsRandomizers
    - uses: actions/checkout@v4
      with:
        repository: thefifthmatt/SoulsFormats
        ref: dsms
        path: SoulsFormats
    # Used by SoulsIds
    - uses: actions/checkout@v4
      with:
        repository: thefifthmatt/SoulsFormatsNEXT
        path: SoulsFormatsNEXT
    - uses: microsoft/setup-msbuild@v2
    - uses: actions/checkout@v4
      with:
        repository: thefifthmatt/yet-another-tab-control
        path: yet-another-tab-control

    - name: Install dependencies
      run: dotnet restore SoulsRandomizers\SoulsRandomizers.sln

    - name: Build randomizer
      run: dotnet publish -o standard -c 'Release (Archipelago)' .\SoulsRandomizers\DS3Randomizer\DS3Randomizer.csproj
      env:
        AP_CLIENT_VERSION: ${{ needs.version.outputs.version }}

    - uses: actions/upload-artifact@v4
      with:
        name: DS3Randomizer.exe
        path: standard\DS3Randomizer.exe
        if-no-files-found: error

  build-ap:
    runs-on: ubuntu-latest
    needs: [version]

    steps:
    - uses: actions/checkout@v4
      with:
        repository: fswap/Archipelago
        token: ${{ secrets.GH_TOKEN }}
        ref: ${{ startsWith(github.ref, env.STABLE_TAG_PREFIX) && 'main' || 'ds3-next' }}
        fetch-depth: 0

    - uses: mikefarah/yq@v4.52.4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.11

    # Do this locally here, but only commit it in the tag-server step so that if
    # something else goes wrong during the release process we don't have
    # mismatched versions.
    - name: Set version
      run: |
        yq --inplace '.world_version = "${{ needs.version.outputs.version }}"' worlds/dark_souls_3/archipelago.json

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-subtests pytest-xdist
        python ModuleUpdate.py --yes --force --append "WebHostLib/requirements.txt"

    - name: Generate apworld
      run: |
        python Launcher.py 'Build APWorlds'
        mv build/apworld/dark_souls_3.apworld dark_souls_3.apworld

    - name: Generate YAML
      run: |
        python Launcher.py 'Generate Template Options'
        mv 'Players/Templates/Dark Souls III.yaml' 'Dark Souls III Options Template.yaml'
        export required_ap_version=$(yq .minimum_ap_version worlds/dark_souls_3/archipelago.json)
        yq --inplace '.requires.version = strenv(required_ap_version)' 'Dark Souls III Options Template.yaml'

    - uses: actions/upload-artifact@v4
      with:
        name: dark_souls_3.apworld
        path: dark_souls_3.apworld
        if-no-files-found: error

    - uses: actions/upload-artifact@v4
      with:
        name: Dark Souls III Options Template.yaml
        path: Dark Souls III Options Template.yaml
        if-no-files-found: error

  build-zip:
    runs-on: ubuntu-latest
    needs: [version, build-mod, build-static, build-ap]
    env:
      dir: DS3 Archipelago ${{ needs.version.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with: {path: client}

    - uses: actions/checkout@v4
      with:
        repository: fswap/SoulsRandomizers
        ref: ${{ startsWith(github.ref, env.STABLE_TAG_PREFIX) && 'archipelago' || 'archipelago-next' }}
        path: SoulsRandomizers

    - name: Download ModEngine3
      run: |
        curl -L https://github.com/garyttierney/me3/releases/download/v0.11.0/me3-windows-amd64.zip > me3-windows.zip
        curl -L https://github.com/garyttierney/me3/releases/download/v0.11.0/me3-linux-amd64.tar.gz > me3-linux.tar.gz

    - run: unzip -d me3-windows me3-windows.zip

    - name: Assemble Windows release
      run: |
        mkdir "$dir"
        cp -r client/crates/ds3-archipelago/release/* "$dir"
        mkdir -p "$dir"/randomizer/spoiler_logs
        mv SoulsRandomizers/dist "$dir/randomizer/dist"
        mv "$dir/randomizer/dist/Presets" "$dir/randomizer/presets"
        mv "$dir/randomizer/dist/Base/script" "$dir/randomizer/script"
        mv "$dir/randomizer/dist/Base/sfx" "$dir/randomizer/sfx"
        mv me3-windows/CHANGELOG.pdf "$dir/ME3-CHANGELOG.pdf"
        mv me3-windows/LICENSE-APACHE "$dir/ME3-LICENSE-APACHE"
        mv me3-windows/LICENSE-MIT "$dir/ME3-LICENSE-MIT"

        # Windows-specific
        mv me3-windows/bin "$dir/bin"
        rm "$dir/launch-ds3.sh"

    - name: Download ds3_archipelago.dll
      uses: actions/download-artifact@v4
      with:
        name: ds3_archipelago.dll
        path: ${{ env.dir }}

    - name: Download apworld
      uses: actions/download-artifact@v4
      with:
        name: dark_souls_3.apworld
        path: ${{ env.dir }}

    - name: Download YAML
      uses: actions/download-artifact@v4
      with:
        name: Dark Souls III Options Template.yaml
        path: ${{ env.dir }}

    - name: Download DS3Randomizer.exe
      uses: actions/download-artifact@v4
      with:
        name: DS3Randomizer.exe
        path: ${{ env.dir }}/randomizer

    - name: Zip release
      run: |
        cd "$dir"
        zip -r ../"${{ env.dir }}-windows.zip" .

    - run: tar xzf me3-linux.tar.gz --one-top-level=me3-linux

    - name: Assemble Linux release
      run: |
        cp -r client/crates/ds3-archipelago/release/* "$dir"
        rm "$dir/launch-ds3.bat"
        rm -r "$dir/bin"
        mv me3-linux/bin "$dir/bin"

    - run: tar czf "${{ env.dir }}-linux.tar.gz" "$dir"

    - uses: softprops/action-gh-release@v2
      with:
        name: "DS3 Archipelago ${{ needs.version.outputs.version }}"
        body_path: ${{ env.dir }}/README.txt
        prerelease: ${{ needs.version.outputs.prerelease }}
        files: |
          ${{ env.dir }}-windows.zip
          ${{ env.dir }}-linux.tar.gz
        token: ${{ secrets.GH_TOKEN }}

  # Only push tags once everything else builds successfully, so that they don't break redeploys.

  tag-server:
    runs-on: ubuntu-latest
    needs: [version, build-zip]
  
    steps:
    - uses: actions/checkout@v4
      with:
        repository: fswap/Archipelago
        token: ${{ secrets.GH_TOKEN }}
        ref: main
        fetch-depth: 0
  
    - name: Set version
      run: |
        yq --inplace '.world_version = "${{ needs.version.outputs.version }}"' worlds/dark_souls_3/archipelago.json

    - uses: EndBug/add-and-commit@v10
      with:
        message: Update Dark Souls III version
        tag: ds3-${{ steps.version.outputs.version }}

  tag-static:
    runs-on: ubuntu-latest
    needs: [build-zip]

    steps:
    - uses: actions/checkout@v4
      with:
        repository: fswap/SoulsRandomizers
        ref: ${{ startsWith(github.ref, env.STABLE_TAG_PREFIX) && 'archipelago' || 'archipelago-next' }}
        token: ${{ secrets.GH_TOKEN }}

    - run: git tag ${{ github.ref_name }}
    - run: git push --tag
